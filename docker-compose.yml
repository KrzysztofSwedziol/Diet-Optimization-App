version: "3.9"
#docker compose down -v - do usunięcia wszystkich volumów (przydatne)
#docker logs -f ollama-init - do podejrzenia logów w czasie rzeczywistym (przydatne jak chcemy obserwować progress bar instalacji)
#docker volume ls - sprawdzenie wszystkich wolumenów (jakbyśmy chcieli usunąć wszystko oprócz potężnej ollamy)
services:
  postgres:
    build:
      context: ./miscellaneous/postgres-database/docker
    image: dyeti/postgres16-jq
    container_name: dyeti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./miscellaneous/postgres-database/init:/docker-entrypoint-initdb.d:ro
      - ./miscellaneous/postgres-database/data:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-dev:
    profiles: ["dev"]
    build:
      context: ./dyeti-backend
      dockerfile: Dockerfile.dev
    container_name: dyeti-backend-dev
    ports:
      - "8081:8081"
    volumes:
      - ./dyeti-backend:/app
      - gradle_cache:/home/gradle/.gradle
    environment:
      APP_NAME: ${APP_NAME:-dyeti-backend}
      SERVER_PORT: 8081
      CORS_ALLOWED_ORIGINS: ${SPRING_CORS_ALLOWED_ORIGINS}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: "-Dspring.devtools.restart.enabled=true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    profiles: ["prod"]
    build:
      context: ./dyeti-backend
      dockerfile: Dockerfile
    container_name: dyeti-backend
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      CORS_ALLOWED_ORIGINS: ${SPRING_CORS_ALLOWED_ORIGINS}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./dyeti-frontend
      dockerfile: Dockerfile.dev
    container_name: dyeti-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./dyeti-frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=${BACKEND_URL}
    restart: unless-stopped

  frontend:
    profiles: ["prod"]
    build:
      context: ./dyeti-frontend
      dockerfile: Dockerfile
    container_name: dyeti-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      VITE_API_URL: ${BACKEND_URL}

volumes:
  pg_data:
  ollama_models:
  gradle_cache:
  frontend_node_modules:
