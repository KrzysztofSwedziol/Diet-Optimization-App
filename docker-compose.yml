version: "3.9"

services:
  postgres:
    build:
      context: ./miscellaneous/postgres-database/docker
    image: dyeti/postgres16-jq
    container_name: dyeti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dyeti
      POSTGRES_PASSWORD: dyeti_pass
      POSTGRES_DB: dyeti_db
    ports:
      - "127.0.0.1:55433:5432" # exposed port is +49152, because non-ephemeral ports caused connection issues
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./miscellaneous/postgres-database/init:/docker-entrypoint-initdb.d:ro
      - ./miscellaneous/postgres-database/data:/seed:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dyeti -d dyeti_db" ]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    shm_size: '1g'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/v1/models || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-dev:
    build:
      context: ./dyeti-backend
      dockerfile: Dockerfile.dev
    container_name: dyeti-backend-dev
    ports:
      - "8081:8081"
    volumes:
      - ./dyeti-backend:/app
      - gradle_cache:/home/gradle/.gradle
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dyeti_db
      SPRING_DATASOURCE_USERNAME: dyeti
      SPRING_DATASOURCE_PASSWORD: dyeti_pass
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./dyeti-backend
      dockerfile: Dockerfile
    container_name: dyeti-backend
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dyeti_db
      SPRING_DATASOURCE_USERNAME: dyeti
      SPRING_DATASOURCE_PASSWORD: dyeti_pass
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


volumes:
  pgdata:
  ollama_models:
  gradle_cache: