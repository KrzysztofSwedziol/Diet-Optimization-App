version: "3.9"
#docker compose down -v - do usunięcia wszystkich volumów (przydatne)
#docker logs -f ollama-init - do podejrzenia logów w czasie rzeczywistym (przydatne jak chcemy obserwować progress bar instalacji)
services:
  postgres:
    build:
      context: ./miscellaneous/postgres-database/docker
    image: dyeti/postgres16-jq
    container_name: dyeti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dyeti
      POSTGRES_PASSWORD: dyeti_pass
      POSTGRES_DB: dyeti_db
    ports:
      - "127.0.0.1:5432:5432" # exposed port is +49152, because non-ephemeral ports caused connection issues
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./miscellaneous/postgres-database/init:/docker-entrypoint-initdb.d:ro
      - ./miscellaneous/postgres-database/data:/seed:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dyeti -d dyeti_db" ]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    shm_size: '1g'
    command: ["serve"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/v1/models || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    volumes:
      - ollama_models:/root/.ollama
    entrypoint: [ "bash", "-c", "sleep 5 && OLLAMA_HOST=http://ollama:11434 ollama pull mistral" ]
    restart: "no"

  backend-dev:
    profiles: ["dev"]
    build:
      context: ./dyeti-backend
      dockerfile: Dockerfile.dev
    container_name: dyeti-backend-dev
    ports:
      - "8081:8081"
    volumes:
      - ./dyeti-backend:/app
      - gradle_cache:/home/gradle/.gradle
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dyeti_db
      SPRING_DATASOURCE_USERNAME: dyeti
      SPRING_DATASOURCE_PASSWORD: dyeti_pass
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: "-Dspring.devtools.restart.enabled=true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    profiles: ["prod"]
    build:
      context: ./dyeti-backend
      dockerfile: Dockerfile
    container_name: dyeti-backend
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dyeti_db
      SPRING_DATASOURCE_USERNAME: dyeti
      SPRING_DATASOURCE_PASSWORD: dyeti_pass
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./dyeti-frontend
      dockerfile: Dockerfile.dev
    container_name: dyeti-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./dyeti-frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  frontend:
    profiles: ["prod"]
    build:
      context: ./dyeti-frontend
      dockerfile: Dockerfile
    container_name: dyeti-frontend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pgdata:
  ollama_models:
  gradle_cache:
  frontend_node_modules: