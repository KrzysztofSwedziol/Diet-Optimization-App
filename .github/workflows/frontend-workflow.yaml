name: Dyeti build frontend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "dyeti-frontend/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "dyeti-frontend/**"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.17.1]
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: dyeti-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci
      - name: Lint JavaScript/TypeScript
        run: npm run lint:js
      - name: Lint CSS/SCSS
        run: npm run lint:css
      - name: Lint MD/JSON
        run: npx prettier --check "src/**/*.{md,json}"
      - name: Build
        run: npm run build
      #- name: Run tests
      #  run: npm test
