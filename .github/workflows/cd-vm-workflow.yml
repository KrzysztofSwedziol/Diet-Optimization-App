name: Deploy on VM Norymberga

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - feature/CD-workflow

jobs:
  deploy:
    if: ${{ github.event_name == 'push' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $(echo "${{ secrets.VM_ADDRESS }}" | awk -F'@' '{print $2}') >> ~/.ssh/known_hosts

      - name: Connect
        run: |
          ssh "${{ secrets.VM_ADDRESS }}" "echo yes"
      - name: Test on VM
        run: |
          ssh "${{ secrets.VM_ADDRESS }}" "ls -la"
